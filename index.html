<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Workspace v9.0</title>
    
    <!-- CodeMirror 5 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Canvas v9.0</h1>
        
        <!-- UI非表示ボタン -->
        <button class="btn-control btn-ui-toggle" onclick="toggleMinimalUI()" title="UI表示切替">👁️</button>
        <!-- 連動スイッチ -->
        <div class="control-group" style="margin-right:5px;">
             <label class="switch">
                <input type="checkbox" id="syncToggle">
                <span class="slider"></span>
            </label>
            <label for="syncToggle" class="switch-label">連動</label>
        </div>

        <!-- タブ表示 -->
        <div class="tabs-container">
            <div class="tab active" id="tab-btn-1" onclick="switchTab(1)">
                📁 <span id="tab-name-1" class="tab-name">default</span>
            </div>
            <div class="tab" id="tab-btn-2" onclick="switchTab(2)">
                📁 <span id="tab-name-2" class="tab-name">tab2</span>
            </div>
            <div class="tab" id="tab-btn-3" onclick="switchTab(3)">
                📁 <span id="tab-name-3" class="tab-name">tab3</span>
            </div>
        </div>

        <span id="status-indicator">Ready</span>

        <button class="btn-control btn-cloud" onclick="openCloudModal()">☁️ 接続</button>

        <div class="control-group">
            <label class="switch">
                <input type="checkbox" id="autoSaveToggle" onchange="toggleAutoSave()">
                <span class="slider"></span>
            </label>
            <label for="autoSaveToggle" class="switch-label">Auto</label>
        </div>

        <button class="btn-control" id="btn-manual-save" onclick="manualSaveAll()">💾</button>
        <button class="btn-control" onclick="createNewWindow()">＋</button>
        <button class="btn-control btn-danger" onclick="clearAllData()">🗑️</button>
        <button class="btn-control btn-cli" onclick="toggleCliViewer()">📡</button>

        <div style="width:10px;"></div>

    </header>

    <div id="canvas"></div>

    <!-- CLI Viewer -->
    <div id="cli-viewer" style="display:none;">
        <div class="cli-topbar">
            <button class="cli-btn-menu" onclick="toggleCliSidebar()">☰</button>
            <span class="cli-current-file" id="cli-current-filename">ファイルを選択</span>
            <button class="cli-charcount-badge" id="cli-charcount-badge" onclick="cliShowCharCountDetail()" title="文字数詳細" style="display:none;">—</button>
            <div style="flex-grow:1;"></div>
            <button class="btn-tool btn-edit" id="cli-btn-edit" onclick="toggleCliEditMode()">📝 編集</button>
            <button class="btn-tool btn-save" id="cli-btn-save" onclick="cliSaveFile()" style="display:none;">💾 保存</button>
            <button class="btn-tool btn-pin" id="cli-pin-btn" onclick="toggleCliPinMode()" title="ピンモード: タップで行をメモに転記">📌</button>
            <button class="btn-tool btn-font" onclick="cliChangeFontSize(-2)">A-</button>
            <button class="btn-tool btn-font" onclick="cliChangeFontSize(2)">A+</button>
            <button class="btn-tool" onclick="cliRefreshFiles()">🔄</button>
            <button class="btn-control" onclick="toggleCliViewer()">✕ 戻る</button>
        </div>

        <div class="cli-sidebar" id="cli-sidebar">
            <div class="cli-sidebar-header">
                <span>📁 CLIファイル</span>
                <button class="btn-tool" onclick="toggleCliSidebar()">✕</button>
            </div>
            <div class="cli-file-tree" id="cli-file-tree">
                <div style="text-align:center; color:#718096; padding:20px;">📡 CLIボタンで開始</div>
            </div>
            <div class="cli-sidebar-footer">
                <button class="btn-control btn-danger" onclick="cliDeleteAllFiles()" style="width:100%; padding:8px;">🗑️ 全ファイル削除</button>
            </div>
        </div>
        <div class="cli-sidebar-overlay" id="cli-sidebar-overlay" onclick="toggleCliSidebar()"></div>

        <div class="cli-main">
            <div class="cli-draft-banner" id="cli-draft-banner" style="display:none;">
                <span id="cli-draft-banner-text">📝 下書きを復元しました</span>
                <div style="flex-grow:1;"></div>
                <button class="btn-tool" onclick="cliDiscardDraftAndRefresh()">🔄 サーバー版</button>
                <button class="btn-tool" onclick="cliDismissDraftBanner()">✕</button>
            </div>
            <div class="cli-viewer-area" id="cli-viewer-area">
                <textarea id="cli-viewer-textarea" style="display:none;"></textarea>
            </div>

            <div class="cli-memo-area" id="cli-memo-area">
                <div class="cli-memo-header">
                    <div class="cli-memo-tabs">
                        <button class="cli-memo-tab active" data-tab="memo" onclick="cliSwitchTab('memo')">📝 メモ</button>
                        <button class="cli-memo-tab" data-tab="instruction" onclick="cliSwitchTab('instruction')">📋 指示パッド</button>
                    </div>
                    <button class="cli-memo-collapse-btn" id="cli-memo-toggle" onclick="toggleCliMemoExpand()">▲</button>
                </div>
                <div class="cli-memo-body" id="cli-memo-body">
                    <!-- メモタブ -->
                    <div class="cli-tab-content active" id="cli-tab-memo">
                        <input type="text" class="input-text" id="cli-memo-section" placeholder="セクション名（任意）">
                        <textarea id="cli-memo-content" class="input-text" rows="3" placeholder="修正指示やメモを入力..."></textarea>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-control btn-cloud" onclick="cliSendMemo()" style="flex:1;">📤 メモを送信</button>
                            <button class="btn-tool" onclick="cliShowMemoHistory()" title="送信済みメモ">📋</button>
                            <button class="btn-tool btn-danger" onclick="cliDeleteAllMemos()" title="全メモ削除" style="padding:4px 8px;">🗑️</button>
                        </div>
                    </div>
                    <!-- 指示パッドタブ -->
                    <div class="cli-tab-content" id="cli-tab-instruction">
                        <textarea id="cli-instruction-content" class="input-text" rows="4" placeholder="AIへの指示をここに書き溜める...&#10;長押しで行テキストを挿入できます"></textarea>
                        <div class="cli-instruction-actions">
                            <button class="btn-path-browse" onclick="cliOpenFolderBrowser()">📂 パス</button>
                            <button class="btn-path-current" onclick="cliInsertCurrentPath()" title="今開いているファイルのパスを挿入">📄 現パス</button>
                            <button class="btn-template" onclick="cliToggleTemplatePopup()" title="テンプレ文の挿入・管理">📌</button>
                            <button class="btn-copy" onclick="cliCopyInstruction()" title="クリップボードにコピー">📋</button>
                            <button class="btn-clear" onclick="cliClearInstruction()">消去</button>
                        </div>

                        <!-- テンプレ管理ポップ -->
                        <div id="cli-template-popup" class="cli-template-popup" style="display:none;">
                            <div class="cli-template-popup-header">
                                <span>📌 テンプレート</span>
                                <button class="cli-template-close" onclick="cliToggleTemplatePopup()">✕</button>
                            </div>
                            <div class="cli-template-list" id="cli-template-list"></div>
                            <div class="cli-template-register">
                                <textarea id="cli-template-input" placeholder="新しいテンプレ文を入力..." rows="2"></textarea>
                                <div class="cli-template-register-actions">
                                    <button class="btn-tmpl-add" onclick="cliRegisterTemplate()">＋ 登録</button>
                                    <button class="btn-tmpl-fromtext" onclick="cliRegisterTemplateFromInstruction()" title="指示パッドの現在の内容をテンプレ登録">指示内容から</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- クラウドモーダル -->
    <div id="cloudModal" class="modal-overlay" onclick="if(event.target===this) closeModal('cloudModal')">
        <div class="modal-box" style="max-width: 450px;">
            <h3 class="modal-title">☁️ クラウド連携</h3>
            <div class="modal-body">
                <div style="background:#1a202c; padding:10px; border-radius:4px; margin-bottom:10px; border:1px solid #4a5568;">
                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                        <span style="font-size:0.9rem; color:#ecc94b;">🔐 E2E暗号化</span>
                        <span id="encKeyStatus" style="font-size:0.75rem;">確認中...</span>
                    </div>
                    <div class="input-group">
                        <input type="text" id="encKeyInput" class="input-text" placeholder="暗号キーを入力..." style="flex:1;">
                        <button class="btn-control" onclick="saveEncKey()" style="padding:6px 10px;">設定</button>
                        <button class="btn-control btn-danger" onclick="removeEncKey()" style="padding:6px 10px;">解除</button>
                    </div>
                </div>
                <div style="background:#2d3748; padding-bottom:15px; border-bottom:2px dashed #4a5568; margin-bottom:10px;">
                    <p style="margin:0 0 10px 0; font-size:0.9rem; color:#cbd5e0;">
                        現在のボード: <strong id="cloud-current-name" style="color:#63b3ed; font-size:1.1rem;">default</strong>
                    </p>
                    <button class="btn-control btn-cloud" style="width:100%; padding:10px; margin-bottom:10px; font-size:1rem;" onclick="processUploadCurrent()">
                        ⬆️ この名前で上書き保存
                    </button>
                    <div class="input-group">
                        <input type="text" id="newBoardInput" class="input-text" placeholder="新しい名前で保存...">
                        <button class="btn-control" onclick="processUploadNew()">新規保存</button>
                    </div>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <span style="font-size:0.85rem; color:#a0aec0;">クラウド上のファイル一覧:</span>
                        <button class="btn-mini" style="background:none; border:1px solid #4a5568; color:#cbd5e0;" onclick="refreshBoardList()">↻ 更新</button>
                    </div>
                    <div id="cloudList" class="board-list" style="height:250px;">
                        <div style="text-align:center; color:#718096; padding:20px;">読み込み中...</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-control" onclick="closeModal('cloudModal')">閉じる</button>
            </div>
        </div>
    </div>

    <!-- フォルダツリーブラウザ モーダル -->
    <div id="folderBrowserModal" class="modal-overlay" onclick="if(event.target===this) closeFolderBrowser()">
        <div class="modal-box folder-browser-modal">
            <h3 class="modal-title">📂 パス挿入</h3>
            <div class="modal-body">
                <input type="text" id="folder-browser-search" class="input-text" placeholder="🔍 フォルダ・ファイル名で検索..." oninput="cliFolderSearch(this.value)">
                <div id="folder-browser-tree" class="folder-browser-tree">
                    <div style="text-align:center; color:#718096; padding:20px;">読み込み中...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-control" onclick="closeFolderBrowser()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- CodeMirror 5 JS本体とモード -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>

    <!-- 既存ロジック -->
    <script src="js/main.js"></script>
    
    <!-- CodeMirror初期化 -->
    <script src="js/cm-init.js"></script>

    <!-- CLI Viewer -->
    <script src="js/cli-viewer.js"></script>
</body>
</html>
